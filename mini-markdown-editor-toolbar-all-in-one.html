<!doctype html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8" />
<title>Mini Markdown Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { color-scheme: dark; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #111827; color: #f3f4f6;
    min-height: 100vh;
  }
  .app { max-width: 768px; margin: 0 auto; padding: 32px 16px; position: relative; z-index: 1; }

  .toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 8px;
    background: #1f2937; color: #f3f4f6;
    border: 1px solid #374151;
    border-radius: 8px 8px 0 0;
    position: sticky; top: 0; z-index: 10;
  }

  .toolbar-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
    opacity: .75; flex-shrink: 0;
    background: none; border: none; color: inherit;
    position: relative;
  }
  .toolbar-btn:hover { opacity: 1; background-color: rgba(140,149,159,.15); }
  #md-tooltip {
    position: fixed;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: inherit;
    white-space: nowrap;
    pointer-events: none;
    z-index: 99999;
    background: #374151;
    color: #e5e7eb;
    border: 1px solid #4b5563;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 0.1s;
  }
  #md-tooltip.show { opacity: 1; }
  .toolbar-btn.active {
    opacity: 1;
    background-color: rgba(59, 130, 246, 0.2);
    color: rgb(59 130 246);
  }
  .toolbar-btn svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .sep {
    width: 1px; height: 20px;
    background: #4b5563; margin: 0 4px; flex-shrink: 0;
  }

  .spacer { flex: 1; }

  .overflow-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
    opacity: .75; flex-shrink: 0;
    background: none; border: none; color: inherit;
  }
  .overflow-btn:hover { opacity: 1; background-color: rgba(140,149,159,.15); }
  .overflow-btn.active { opacity: 1; background-color: rgba(59, 130, 246, 0.2); color: rgb(59 130 246); }
  .overflow-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .overflow-wrapper { flex-shrink: 0; }

  .overflow-dropdown {
    position: fixed; z-index: 99999;
    min-width: 180px; padding: 4px;
    background: #1f2937; border: 1px solid #374151;
    border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    flex-direction: column; gap: 2px;
    display: none;
    margin: 0;
  }
  .overflow-dropdown.open { display: flex; }
  .overflow-dropdown .toolbar-btn {
    width: 100%; justify-content: flex-start; gap: 8px;
    padding: 6px 8px; height: auto; border-radius: 4px;
    font-size: 13px; font-family: inherit; opacity: .85;
  }
  .overflow-dropdown .toolbar-btn:hover { opacity: 1; background-color: rgba(140,149,159,.15); }
  .overflow-dropdown .toolbar-btn .btn-label { white-space: nowrap; }

  textarea {
    width: 100%; padding: 12px; outline: none; resize: vertical;
    font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas',monospace;
    font-size: 14px; line-height: 1.5;
    background: #111827; color: #f3f4f6;
    border: 1px solid #374151; border-top: none;
    border-radius: 0 0 8px 8px; min-height: 400px;
  }


  .footer { font-size: 12px; color: #6b7280; margin-top: 8px; text-align: center; }
</style>
</head>

<script>
class TextareaAdapter {
  constructor(el) {
    this._el = el;
  }
  get value() { return this._el.value; }
  set value(v) { this._el.value = v; }
  get selectionStart() { return this._el.selectionStart; }
  set selectionStart(v) { this._el.selectionStart = v; }
  get selectionEnd() { return this._el.selectionEnd; }
  set selectionEnd(v) { this._el.selectionEnd = v; }
  focus() { this._el.focus(); }
  setSelectionRange(a, b) { this._el.setSelectionRange(a, b); }
  dispatchEvent(e) { this._el.dispatchEvent(e); }
  addEventListener(ev, fn, opts) { this._el.addEventListener(ev, fn, opts); }
  removeEventListener(ev, fn) { this._el.removeEventListener(ev, fn); }
  get contentEditable() { return this._el.contentEditable; }
  set contentEditable(v) { this._el.contentEditable = v; }
}

const editor = new TextareaAdapter(document.querySelector('#textarea'));
document.querySelector('markdown-toolbar')._editor = editor;
</script>

<script>
// History Manager
(function() {
  const ta = editor;
  const undoBtn = document.getElementById('undo-btn');
  const redoBtn = document.getElementById('redo-btn');
  let history = [ta.value];
  let index = 0;

  function updateButtons() {
    undoBtn.style.opacity = index > 0 ? '1' : '0.3';
    redoBtn.style.opacity = index < history.length - 1 ? '1' : '0.3';
  }

  function push() {
    if (ta.value === history[index]) return;
    history = history.slice(0, index + 1);
    history.push(ta.value);
    index++;
    updateButtons();
  }

  function undo() {
    if (index > 0) {
      index--;
      ta.value = history[index];
      ta.dispatchEvent(new Event('input', { bubbles: true }));
      updateButtons();
    }
  }

  function redo() {
    if (index < history.length - 1) {
      index++;
      ta.value = history[index];
      ta.dispatchEvent(new Event('input', { bubbles: true }));
      updateButtons();
    }
  }

  undoBtn.addEventListener('click', undo);
  redoBtn.addEventListener('click', redo);
  
  // Throttle to avoid too many history entries
  let timeout;
  ta.addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(push, 500);
  });

  updateButtons();
})();

// Responsive overflow
(function(){
  const tb = document.querySelector('markdown-toolbar');
  const wrap = document.getElementById('overflow-wrap');
  const btn = document.getElementById('overflow-btn');
  const drop = document.getElementById('overflow-drop');

  const SEL = [
    'md-bold','md-italic','md-strikethrough','md-underline','md-header',
    'md-link','md-image','md-quote','md-code','md-code-block',
    'md-unordered-list','md-ordered-list','md-task-list','md-table','md-highlight','md-tag','md-mention'
  ].join(',');

  const buttons = Array.from(tb.querySelectorAll(SEL));
  const undoBtn = document.getElementById('undo-btn');
  const redoBtn = document.getElementById('redo-btn');
  buttons.push(undoBtn, redoBtn);
  let open = false;
  let ticking = false;

  // Start hidden
  wrap.style.display = 'none';

  function rebuild(hidden) {
    drop.innerHTML = '';
    for (const el of hidden) {
      const c = document.createElement('button');
      c.className = 'toolbar-btn';
      c.setAttribute('type', 'button');
      const t = el.getAttribute('title') || el.getAttribute('data-title') || '';
      const l = document.createElement('span');
      l.className = 'btn-label';
      l.textContent = t;
      const svg = el.querySelector('svg').cloneNode(true);
      c.appendChild(svg);
      c.appendChild(l);
      c.addEventListener('click', function(e) { e.stopPropagation(); el.click(); close(); });
      drop.appendChild(c);
    }
  }

  function totalWidth() {
    var children = tb.children;
    var w = 0;
    for (var i = 0; i < children.length; i++) {
      w += children[i].offsetWidth;
      if (i < children.length - 1) w += 4;
    }
    return w;
  }

  function layout() {
    if (ticking) return;
    ticking = true;

    // Show all buttons, hide overflow
    for (var bi = 0; bi < buttons.length; bi++) { buttons[bi].style.display = ''; }
    wrap.style.display = 'none';

    // offsetWidth forces synchronous reflow — measure immediately
    var tw = tb.offsetWidth;
    if (!tw) { ticking = false; return; }

    var availContent = tw - 16;
    var needed = totalWidth();

    if (needed <= availContent) {
      close();
      ticking = false;
      return;
    }

    // Need overflow — show wrap button
    wrap.style.display = '';
    var wrapW = wrap.offsetWidth;

    // Measure sticky widths (undo/redo, spacer, sep)
    var stickyW = 0;
    var children = tb.children;
    for (var ci = 0; ci < children.length; ci++) {
      if (children[ci].classList.contains('spacer') || children[ci].classList.contains('sep') || children[ci].id === 'undo-btn' || children[ci].id === 'redo-btn') {
        stickyW += children[ci].offsetWidth;
      }
    }

    // Available for buttons = toolbar content - sticky - wrap - gaps
    var avail = availContent - stickyW - wrapW - 8;

    // Hide buttons from the end until remaining fit
    var hidden = [];
    for (var hi = buttons.length - 1; hi >= 0; hi--) {
      if (buttons[hi].id === 'undo-btn' || buttons[hi].id === 'redo-btn') continue;
      buttons[hi].style.display = 'none';
      hidden.push(buttons[hi]);

      var visW = 0;
      for (var vj = 0; vj < hi; vj++) {
        if (buttons[vj].id === 'undo-btn' || buttons[vj].id === 'redo-btn') continue;
        visW += buttons[vj].offsetWidth + 4;
      }

      if (visW <= avail) break;
    }

    // Hide trailing or orphaned separators
    for (var si = 0; si < children.length; si++) {
      var c = children[si];
      if (c.classList.contains('sep')) {
        var prevVisible = null, nextVisible = null;
        for (var pi = si - 1; pi >= 0; pi--) { if (children[pi].style.display !== 'none') { prevVisible = children[pi]; break; } }
        for (var ni = si + 1; ni < children.length; ni++) { if (children[ni].style.display !== 'none') { nextVisible = children[ni]; break; } }
        if (!nextVisible || (prevVisible && prevVisible.classList.contains('sep'))) {
          c.style.display = 'none';
        }
      }
    }

    rebuild(hidden);
    if (!open) close();
    ticking = false;
  }

  function openD() {
    open = true;
    var r = btn.getBoundingClientRect();
    drop.style.top = (r.bottom + 15) + 'px';
    drop.style.right = (window.innerWidth - r.right) + 'px';
    drop.classList.add('open');
    btn.classList.add('active');
    // Move to body to avoid any parent clipping
    document.body.appendChild(drop);
  }
  function close() {
    open = false;
    drop.classList.remove('open');
    btn.classList.remove('active');
    // Put back inside wrap for correct layout measurements
    wrap.appendChild(drop);
  }

  btn.addEventListener('click', function(e) { e.stopPropagation(); open ? close() : openD(); });
  document.addEventListener('click', function(e) {
    if (open && !drop.contains(e.target) && e.target !== btn) close();
  });

  new ResizeObserver(layout).observe(tb);
  window.addEventListener('resize', layout);
  layout();
})();
</script>

<!-- Smart hashtag (#) and mention (@) — defined before library to prevent default prefixSpace behavior -->
<script>
(function() {
  if (customElements.get('md-tag')) return;
  function toggleTag(ta) {
    var s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
    var wc = /[a-zA-Z0-9_\u00C0-\u024F]/;
    if (s === e) {
      while (s > 0 && v[s-1] && wc.test(v[s-1])) s--;
      while (e < v.length && v[e] && wc.test(v[e])) e++;
    }
    var word = v.substring(s, e);
    if (!word) return;
    ta.focus();
    if (s > 0 && v[s-1] === '#') {
      ta.setSelectionRange(s - 1, e);
      try { document.execCommand('insertText', false, word); } catch(_) {
        var st = ta.scrollTop;
        ta.value = v.substring(0, s - 1) + word + v.substring(e);
        ta.scrollTop = st;
      }
      ta.setSelectionRange(s - 1, e - 1);
    } else {
      ta.setSelectionRange(s, e);
      try { document.execCommand('insertText', false, '#' + word); } catch(_) {
        var st = ta.scrollTop;
        ta.value = v.substring(0, s) + '#' + word + v.substring(e);
        ta.scrollTop = st;
      }
      ta.setSelectionRange(s + 1, e + 1);
    }
    ta.dispatchEvent(new Event('input', { bubbles: true, cancelable: true }));
  }
  class SmartTag extends HTMLElement {
    connectedCallback() {
      if (this._tagged) return; this._tagged = true;
      if (!this.hasAttribute('role')) this.setAttribute('role', 'button');
      var self = this;
      this.addEventListener('click', function(e) {
        e.preventDefault();
        var tb = self.closest('markdown-toolbar');
        if (tb) toggleTag(tb.field);
      });
      this.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          var tb = self.closest('markdown-toolbar');
          if (tb) toggleTag(tb.field);
        }
      });
    }
  }
  customElements.define('md-tag', SmartTag);

  // Smart mention (@) — same as tag but with @
  if (!customElements.get('md-mention')) {
    function toggleMention(ta) {
      var s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
      var wc = /[a-zA-Z0-9_\u00C0-\u024F]/;
      if (s === e) {
        while (s > 0 && v[s-1] && wc.test(v[s-1])) s--;
        while (e < v.length && v[e] && wc.test(v[e])) e++;
      }
      var word = v.substring(s, e);
      if (!word) return;
      ta.focus();
      if (s > 0 && v[s-1] === '@') {
        ta.setSelectionRange(s - 1, e);
        try { document.execCommand('insertText', false, word); } catch(_) {
          var st = ta.scrollTop;
          ta.value = v.substring(0, s - 1) + word + v.substring(e);
          ta.scrollTop = st;
        }
        ta.setSelectionRange(s - 1, e - 1);
      } else {
        ta.setSelectionRange(s, e);
        try { document.execCommand('insertText', false, '@' + word); } catch(_) {
          var st = ta.scrollTop;
          ta.value = v.substring(0, s) + '@' + word + v.substring(e);
          ta.scrollTop = st;
        }
        ta.setSelectionRange(s + 1, e + 1);
      }
      ta.dispatchEvent(new Event('input', { bubbles: true, cancelable: true }));
    }
    class SmartMention extends HTMLElement {
      connectedCallback() {
        if (this._tagged) return; this._tagged = true;
        if (!this.hasAttribute('role')) this.setAttribute('role', 'button');
        var self = this;
        this.addEventListener('click', function(e) {
          e.preventDefault();
          var tb = self.closest('markdown-toolbar');
          if (tb) toggleMention(tb.field);
        });
        this.addEventListener('keydown', function(e) {
          if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            var tb = self.closest('markdown-toolbar');
            if (tb) toggleMention(tb.field);
          }
        });
      }
    }
    customElements.define('md-mention', SmartMention);
  }
})();
</script>

<!-- markdown-toolbar-element (from GitHub) - unmodified -->
<script>
function getButtons(toolbar) {
  const els = [];
  for (const button of toolbar.querySelectorAll(
    '[data-md-button],md-header,md-bold,md-italic,md-quote,md-code,md-code-block,md-link,md-image,md-unordered-list,md-ordered-list,md-task-list,md-tag,md-highlight,md-underline,md-ref,md-strikethrough,md-table,md-mention'
  )) {
    if (button.hidden || (button.offsetWidth <= 0 && button.offsetHeight <= 0)) continue;
    if (button.closest('markdown-toolbar') === toolbar) els.push(button);
  }
  return els;

  if (button.tagName.toLowerCase() === 'md-header') { cycleHeader(field); return; }
  if (button.tagName.toLowerCase() === 'md-code-block') { cycleCodeBlock(field); return; }
  if (button.tagName.toLowerCase() === 'md-quote') { cycleQuote(field); return; }
  const defaults = { prefix: '', suffix: '', blockPrefix: '', blockSuffix: '', multiline: false, replaceNext: '', prefixSpace: false, scanFor: '', surroundWithNewlines: false, orderedList: false, unorderedList: false, trimFirst: false };
  const style = { ...defaults, ...stylesToApply };
  styleSelectedText(field, style);
}
const tip = document.createElement('div');
tip.id = 'md-tooltip';
document.body.appendChild(tip);
document.addEventListener('mouseover', function(e) {
  const el = e.target.closest('[data-title]');
  if (!el) { tip.classList.remove('show'); return; }
  const t = el.getAttribute('data-title');
  if (!t || el.closest('.overflow-dropdown')) { tip.classList.remove('show'); return; }
  tip.textContent = t;
  const r = el.getBoundingClientRect();
  const gap = 8;
  const tipH = 26;
  if (r.top - gap - tipH >= 0) {
    tip.style.top = (r.top - gap - tipH) + 'px';
    tip.style.bottom = 'auto';
  } else {
    tip.style.top = (r.bottom + gap) + 'px';
    tip.style.bottom = 'auto';
  }
  tip.style.left = Math.max(4, Math.min(r.left + r.width / 2 - tip.offsetWidth / 2, window.innerWidth - tip.offsetWidth - 4)) + 'px';
  tip.classList.add('show');
});
</script>
