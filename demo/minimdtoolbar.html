<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<title>Mini Markdown Editor (demo)</title>
<link rel="stylesheet" href="minimdtoolbar.css" />
</head>
<body>

  <div class="app">

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <h1 style="font-size:20px;font-weight:600;margin:0">Mini Markdown Toolbar</h1>
      <button type="button" id="theme-btn" class="toolbar-btn" title="Toggle theme" style="margin-left:auto">
        <svg viewBox="0 0 24 24" id="theme-icon" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>

    <markdown-toolbar for="textarea" class="toolbar">

      <!-- Text formatting -->
      <md-bold class="toolbar-btn" title="Bold">
        <svg viewBox="0 0 24 24"><path d="M14 12a4 4 0 0 0 0-8H6v8"/><path d="M15 20a4 4 0 0 0 0-8H6v8Z"/></svg>
      </md-bold>

      <md-italic class="toolbar-btn" title="Italic">
        <svg viewBox="0 0 24 24"><line x1="19" x2="10" y1="4" y2="4"/><line x1="14" x2="5" y1="20" y2="20"/><line x1="15" x2="9" y1="4" y2="20"/></svg>
      </md-italic>

      <md-strikethrough class="toolbar-btn" title="Strikethrough">
        <svg viewBox="0 0 24 24"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" x2="20" y1="12" y2="12"/></svg>
      </md-strikethrough>

      <md-underline class="toolbar-btn" title="Underline">
        <svg viewBox="0 0 24 24"><path d="M6 4v6a6 6 0 0 0 12 0V4"/><line x1="4" x2="20" y1="20" y2="20"/></svg>
      </md-underline>

      <md-header class="toolbar-btn" title="Heading">
        <svg viewBox="0 0 24 24"><path d="M6 12h12"/><path d="M6 4v16"/><path d="M18 4v16"/></svg>
      </md-header>

      <span class="sep"></span>

      <!-- Links / media -->
      <md-link class="toolbar-btn" title="Link">
        <svg viewBox="0 0 24 24"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" x2="16" y1="12" y2="12"/></svg>
      </md-link>

      <md-image class="toolbar-btn" title="Image">
        <svg viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      </md-image>

      <span class="sep"></span>

      <!-- Blocks -->
      <md-quote class="toolbar-btn" title="Quote">
        <svg width="24px" height="24px" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"><path d="m175.6 204.73 22.19 46.49C258.61 223.15 278 189.49 278 151.18V48.78H175.6v102.4h51.2c0 15.64-12.42 35.66-51.2 53.55zm-153.6 0 22.19 46.49c60.83-28.07 80.21-61.73 80.21-100.04V48.78H22v102.4h51.2c0 15.64-12.42 35.66-51.2 53.55z" fill="currentColor"/></svg>
      </md-quote>

      <md-code class="toolbar-btn" title="Code Inline">
        <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </md-code>

      <md-code-block class="toolbar-btn" title="Code Block" data-md-button="code-block">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-code-xml-icon lucide-code-xml"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
      </md-code-block>

      <span class="sep"></span>

      <!-- Lists -->
      <md-unordered-list class="toolbar-btn" title="Unordered List">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list-icon lucide-list"><path d="M3 5h.01"/><path d="M3 12h.01"/><path d="M3 19h.01"/><path d="M8 5h13"/><path d="M8 12h13"/><path d="M8 19h13"/></svg>
      </md-unordered-list>

      <md-ordered-list class="toolbar-btn" title="Ordered List">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list-ordered-icon lucide-list-ordered"><path d="M11 5h10"/><path d="M11 12h10"/><path d="M11 19h10"/><path d="M4 4h1v5"/><path d="M4 9h2"/><path d="M6.5 20H3.4c0-1 2.6-1.925 2.6-3.5a1.5 1.5 0 0 0-2.6-1.02"/></svg>
      </md-ordered-list>

      <md-task-list class="toolbar-btn" title="Task List">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list-todo-icon lucide-list-todo"><path d="M13 5h8"/><path d="M13 12h8"/><path d="M13 19h8"/><path d="m3 17 2 2 4-4"/><rect x="3" y="4" width="6" height="6" rx="1"/></svg>
      </md-task-list>

      <span class="sep"></span>

      <!-- Extras -->
      <md-table class="toolbar-btn" title="Table" data-md-button="table">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
      </md-table>

      <md-highlight class="toolbar-btn" title="Highlight">
        <svg viewBox="0 0 24 24"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
      </md-highlight>

      <md-tag class="toolbar-btn" title="Tag">
        <svg viewBox="0 0 24 24"><path d="M4 9h16"/><path d="M4 15h16"/><path d="M10 3 8 21"/><path d="M16 3l-2 18"/></svg>
      </md-tag>

      <md-mention class="toolbar-btn" title="Mention">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"/></svg>
      </md-mention>

      <span class="spacer"></span>

      <!-- Undo/Redo -->
      <button type="button" class="toolbar-btn" id="undo-btn" title="Undo">
         <svg viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.36 2.64L3 13"/></svg>
      </button>
      <button type="button" class="toolbar-btn" id="redo-btn" title="Redo">
         <svg viewBox="0 0 24 24"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6.36 2.64L21 13"/></svg>
      </button>

      <div class="overflow-wrapper" id="overflow-wrap">
        <button type="button" class="overflow-btn" id="overflow-btn" title="More options">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
        <div class="overflow-dropdown" id="overflow-drop"></div>
      </div>

    </markdown-toolbar>

    <textarea id="textarea"># My Document

This is a **bold paragraph** and here is _an italic one_.

~~Strikethrough text~~ and ==highlighted text==

> An important quote

## Bullet List
- First item
- Second item
- Third item</textarea>

    <div class="footer">Ctrl+Z / Ctrl+Y for native Undo/Redo</div>

  </div>

<script>
// Theme toggle (standalone for this demo)
(function(){
  var btn = document.getElementById('theme-btn');
  var icon = document.getElementById('theme-icon');
  var sun = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';
  var moon = '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
  btn.addEventListener('click', function(){
    document.body.classList.toggle('light');
    icon.innerHTML = document.body.classList.contains('light') ? sun : moon;
  });
})();
</script>
<script>
var tip2 = document.createElement('div');
tip2.id = 'md-tooltip';
document.body.appendChild(tip2);
document.querySelectorAll('.toolbar-btn, .overflow-btn').forEach(function(el){ var t = el.getAttribute('title'); if (t) { el.setAttribute('data-title', t); el.removeAttribute('title'); } });
document.addEventListener('mouseover', function(e) {
  var el = e.target.closest('[data-title]');
  if (!el) { tip2.classList.remove('show'); return; }
  var t = el.getAttribute('data-title');
  if (!t || el.closest('.overflow-dropdown')) { tip2.classList.remove('show'); return; }
  tip2.textContent = t;
  var r = el.getBoundingClientRect();
  var gap = 8, tipH = 26;
  if (r.top - gap - tipH >= 0) {
    tip2.style.top = (r.top - gap - tipH) + 'px';
  } else {
    tip2.style.top = (r.bottom + gap) + 'px';
  }
  tip2.style.left = Math.max(4, Math.min(r.left + r.width / 2 - tip2.offsetWidth / 2, window.innerWidth - tip2.offsetWidth - 4)) + 'px';
  tip2.style.bottom = 'auto';
  tip2.classList.add('show');
});
</script>
<script src="minimdtoolbar.js"></script>

</body>
</html>
